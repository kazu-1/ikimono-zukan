<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全体マップ | 生き物図鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #full-map { height: calc(100vh - 64px); }
        .leaflet-popup-content-wrapper { width: 340px; border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { width: 340px !important; margin: 0 !important; }
        .popup-img { width: 100%; height: 200px; object-fit: cover; display: block; }

        /* ✅ カスタムピンのスタイル */
        .custom-pin {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            border-radius: 50% 50% 50% 0; /* しずく型 */
            transform: rotate(-45deg);
            border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .pin-content {
            transform: rotate(45deg); /* 中の絵文字を正位置に戻す */
            font-size: 20px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <header class="bg-teal-600 text-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold cursor-pointer" onclick="location.href='/'">生き物図鑑</h1>
        <div class="space-x-4">
            <a href="/" class="text-sm bg-teal-700 px-3 py-2 rounded-lg hover:bg-teal-800 transition">リスト表示</a>
            <a href="/upload" class="text-sm bg-orange-500 px-3 py-2 rounded-lg hover:bg-orange-600 transition">投稿する</a>
        </div>
    </header>

    <main id="full-map"></main>

    <script>
        const map = L.map('full-map').setView([35.6895, 139.6917], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // ✅ 1. カテゴリごとの配色と絵文字の定義
        const categoryConfig = {
            "さかな": { color: "#3B82F6", icon: "🐟" }, // 青
            "貝類":   { color: "#EC4899", icon: "🐚" }, // ピンク
            "甲殻類": { color: "#EF4444", icon: "🦀" }, // 赤
            "鳥":     { color: "#06B6D4", icon: "🐦" }, // 水色
            "植物":   { color: "#10B981", icon: "🌿" }, // 緑
            "キノコ": { color: "#92400E", icon: "🍄" }, // 茶色
            "虫":     { color: "#F59E0B", icon: "🦋" }, // オレンジ
            "その他": { color: "#6B7280", icon: "📍" }  // グレー
        };

        const items = {{ items | tojson | safe }};
        const bounds = [];

        items.forEach(item => {
            if (item.latitude && item.longitude) {
                const pos = [item.latitude, item.longitude];
                bounds.push(pos);

                // ✅ 2. カテゴリ設定の取得
                const config = categoryConfig[item.category] || categoryConfig["その他"];

                // ✅ 3. カスタムアイコンの作成
                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `
                        <div class="custom-pin" style="background-color: ${config.color};">
                            <span class="pin-content">${config.icon}</span>
                        </div>
                    `,
                    iconSize: [40, 40],
                    iconAnchor: [20, 40], // ピンの先端（下）を座標に合わせる
                    popupAnchor: [0, -40]  // ポップアップが出る位置を調整
                });

                // ピンを立てる
                const marker = L.marker(pos, { icon: customIcon }).addTo(map);
                
                const popupContent = `
                    <div style="width: 340px;">
                        <img src="${item.image_urls[0]}" class="popup-img">
                        <div class="p-4">
                            <p class="font-bold text-lg text-gray-800 mb-1">
                                ${item.species_name || '名称不明'}
                            </p>
                            <div class="flex gap-2 mb-2">
                                <span class="text-[10px] px-2 py-0.5 rounded-full" 
                                      style="background-color: ${config.color}22; color: ${config.color}; border: 1px solid ${config.color}44;">
                                    ${item.category}
                                </span>
                                ${item.is_identified ? '<span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">同定済</span>' : ''}
                            </div>
                            <p class="text-xs text-blue-600 flex items-center">
                                <span class="mr-1">📍</span>${item.location_name}
                            </p>
                        </div>
                    </div>
                `;
                marker.bindPopup(popupContent);
            }
        });

        if (bounds.length > 0) {
            map.fitBounds(bounds);
        }
    </script>
</body>
</html>
