<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | 僕たちの図鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('/photo/hamaguri.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-teal-800 mb-6">僕たちの図鑑へようこそ</h1>
        
        {% if error %}
        <div class="mb-4 p-3 bg-red-100 border-l-4 border-red-500 text-red-700 text-sm">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="mb-4 p-3 bg-green-100 border-l-4 border-green-500 text-green-700 text-sm rounded">
            {{ success }}
        </div>
        {% endif %}

        <form action="/auth" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">メールアドレス</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">パスワード</label>
                <input type="password" name="password" required minlength="6" 
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"
                    placeholder="6文字以上で入力してください">
            </div>
            
            <div id="username-field" class="hidden space-y-1">
                <label class="block text-sm font-medium text-gray-700">ユーザー名</label>
                <input type="text" id="username-input" name="username" 
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none" 
                    placeholder="図鑑に表示される名前">
            </div>
            
            <div class="flex flex-col gap-3 pt-2">
                <button type="submit" id="login-btn" name="action" value="login" 
                    class="w-full bg-teal-600 text-white py-2 rounded-lg font-bold hover:bg-teal-700 transition">
                    ログイン
                </button>

                <button type="button" id="signup-trigger" onclick="toggleSignupMode(true)"
                    class="w-full border-2 border-teal-600 text-teal-600 py-2 rounded-lg font-bold hover:bg-teal-50 transition">
                    新規アカウント作成
                </button>

                <button type="submit" id="signup-submit" name="action" value="signup" 
                    class="hidden w-full bg-orange-500 text-white py-2 rounded-lg font-bold hover:bg-orange-600 transition">
                    この内容で登録する
                </button>

                <button type="button" id="back-to-login" onclick="toggleSignupMode(false)"
                    class="hidden w-full text-gray-500 text-sm font-medium hover:underline transition py-2">
                    すでにアカウントをお持ちの方（ログイン）
                </button>
            </div>
        </form>
    </div>

    <script>
        function toggleSignupMode(isSignup) {
            const usernameField = document.getElementById('username-field');
            const usernameInput = document.getElementById('username-input');
            const loginBtn = document.getElementById('login-btn');
            const signupTrigger = document.getElementById('signup-trigger');
            const signupSubmit = document.getElementById('signup-submit');
            const backToLogin = document.getElementById('back-to-login'); // 追加

            if (isSignup) {
                // 新規登録モード
                usernameField.classList.remove('hidden');
                signupSubmit.classList.remove('hidden');
                backToLogin.classList.remove('hidden'); // 戻るボタンを表示
                loginBtn.classList.add('hidden');
                signupTrigger.classList.add('hidden');
                usernameInput.setAttribute('required', 'required');
            } else {
                // ログインモードに戻る
                usernameField.classList.add('hidden');
                signupSubmit.classList.add('hidden');
                backToLogin.classList.add('hidden'); // 戻るボタンを隠す
                loginBtn.classList.remove('hidden');
                signupTrigger.classList.remove('hidden');
                usernameInput.removeAttribute('required');
                usernameInput.value = ""; // 入力内容をクリア
            }
        }
    </script>
</body>
</html>
