<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規投稿 | 生き物図鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 背景画像の設定 */
            background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1920&q=80'); /* 自然の景色の例 */
            background-attachment: fixed; /* スクロールしても背景を動かさない */
            background-size: cover;      /* 画面いっぱいに広げる */
            background-position: center; /* 中央合わせ */
            position: relative;
        }

        /* 文字を読みやすくするための半透明の膜 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7); /* 白い半透明（0.7は透明度） */
            z-index: -1; /* コンテンツより後ろに配置 */
        }

        /* カードなどの白背景を少し透けさせるとおしゃれ */
        .bg-white {
            background-color: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(5px); /* 背景をぼかす（イマドキな表現） */
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pt-10 pb-20">
    <div class="max-w-2xl mx-auto px-6">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-teal-600 mb-2">新規投稿</h1>
            <p class="text-gray-500">見つけた生き物を記録しましょう</p>
        </header>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            <form id="uploadForm" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">登録者名</label>
                    <input type="text" name="username" required placeholder="あなたの名前"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none transition">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">種名</label>
                        <input type="text" name="species_name" placeholder="例：マツバガイ"
                            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <div class="flex items-end pb-3">
                        <label class="flex items-center space-x-2 cursor-pointer group">
                            <input type="checkbox" name="is_identified" value="true" 
                                class="w-5 h-5 rounded text-teal-500 border-gray-300 focus:ring-teal-500">
                            <span class="text-sm font-bold text-gray-700 group-hover:text-teal-600 transition">同定済み（名前確定）</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">観察日</label>
                        <input type="date" name="observed_on" id="observed_on" required
                            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">分類</label>
                        <select name="category" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none">
                            <option>さかな</option>
                            <option>貝類</option>
                            <option>甲殻類</option>
                            <option>草本</option>
                            <option>樹木</option>
                            <option>キノコ</option>
                            <option>虫</option>
                            <option>その他</option>
                        </select>
                    </div>
                </div>

                <div id="location-section">
                    <label class="block text-sm font-bold text-gray-700 mb-2">場所</label>
                    <input type="text" id="location_name" name="location_name" placeholder="画像を読み込むと自動取得します"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 bg-gray-50 focus:ring-2 focus:ring-teal-500 outline-none transition">
                    <p id="location-hint" class="mt-1 text-xs text-gray-500">※GPSがない場合は手入力してください</p>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">写真</label>
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg hover:border-teal-500 transition">
                        <div class="space-y-1 text-center">
                            <svg id="upload-icon" class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <div id="loading-spinner" class="hidden mx-auto h-12 w-12 animate-spin rounded-full border-4 border-teal-500 border-t-transparent"></div>
                            
                            <div class="flex text-sm text-gray-600 justify-center">
                                <label class="relative cursor-pointer bg-white rounded-md font-medium text-teal-600 hover:text-teal-500 focus-within:outline-none">
                                    <span id="file-label-text">ファイルを選択</span>
                                    <input type="file" id="files" name="files" multiple required class="sr-only">
                                </label>
                                <p class="pl-1">またはドラッグ＆ドロップ</p>
                            </div>
                            <p class="text-xs text-gray-500">PNG, JPG, HEIC up to 10MB</p>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">メモ</label>
                    <textarea name="notes" rows="3" placeholder="特徴や周囲の状況など"
                        class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none"></textarea>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="location.href='/'" 
                        class="flex-1 bg-gray-200 text-gray-700 py-4 rounded-xl font-bold hover:bg-gray-300 transition shadow-sm">
                        キャンセル
                    </button>
                    <button type="submit" id="submit-btn"
                        class="flex-[2] bg-teal-600 text-white py-4 rounded-xl font-bold hover:bg-teal-700 shadow-lg transition transform active:scale-95 disabled:bg-gray-400">
                        投稿を公開する
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('files');
        const locationInput = document.getElementById('location_name');
        const submitBtn = document.getElementById('submit-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const uploadIcon = document.getElementById('upload-icon');
        const fileLabelText = document.getElementById('file-label-text');

        // 今日の日付をデフォルトセット
        document.getElementById('observed_on').valueAsDate = new Date();

        // ファイル選択時の表示変更
        fileInput.addEventListener('change', (e) => {
            const count = e.target.files.length;
            fileLabelText.innerText = count > 0 ? `${count}枚の画像を選択中` : 'ファイルを選択';
        });

        // フォーム送信処理（Fetch APIを使用）
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UIを「送信中」状態に
            submitBtn.disabled = true;
            submitBtn.innerText = "処理中...";
            uploadIcon.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');

            const formData = new FormData(form);

            try {
                const response = await fetch('/do_upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.status === 400 && result.status === 'need_location') {
                    // GPSがなかった場合の処理
                    alert(result.message);
                    locationInput.classList.remove('bg-gray-50');
                    locationInput.classList.add('border-red-500', 'bg-white');
                    locationInput.focus();
                    
                    // UIを元に戻す（ユーザーに入力させるため）
                    submitBtn.disabled = false;
                    submitBtn.innerText = "投稿を公開する";
                    uploadIcon.classList.remove('hidden');
                    loadingSpinner.classList.add('hidden');
                } else if (response.ok) {
                    alert("投稿が完了しました！");
                    window.location.href = "/";
                } else {
                    throw new Error(result.error || "予期せぬエラーが発生しました");
                }
            } catch (err) {
                alert("エラー: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "投稿を公開する";
                uploadIcon.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
