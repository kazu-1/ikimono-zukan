<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規投稿 | 生き物図鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 背景画像の設定 */
            background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1920&q=80'); /* 自然の景色の例 */
            background-attachment: fixed; /* スクロールしても背景を動かさない */
            background-size: cover;      /* 画面いっぱいに広げる */
            background-position: center; /* 中央合わせ */
            position: relative;
        }

        /* 文字を読みやすくするための半透明の膜 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7); /* 白い半透明（0.7は透明度） */
            z-index: -1; /* コンテンツより後ろに配置 */
        }

        /* カードなどの白背景を少し透けさせるとおしゃれ */
        .bg-white {
            background-color: rgba(236, 204, 204, 0.9) !important;
            backdrop-filter: blur(5px); /* 背景をぼかす（イマドキな表現） */
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pt-10 pb-20">
    <div class="max-w-2xl mx-auto my-10">
        <div class="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-2xl border border-white/40">
            <header class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-teal-700 mb-2">新規投稿</h2>
                <p class="text-gray-500 text-sm">見つけた生き物を記録しましょう</p>
            </header>
            <form id="uploadForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-extrabold text-teal-800 mb-2 ml-1">📸 写真</label>
                    <div class="mt-1 flex justify-center px-6 pt-8 pb-8 border-2 border-gray-300 border-dashed rounded-2xl hover:border-teal-500 transition-all bg-gray-50/50">
                        <div class="space-y-2 text-center">
                            <svg id="upload-icon" class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <div id="loading-spinner" class="hidden mx-auto h-12 w-12 animate-spin rounded-full border-4 border-teal-500 border-t-transparent"></div>
                            
                            <div class="flex text-sm text-gray-600 justify-center">
                                <label class="relative cursor-pointer bg-teal-50 rounded-lg font-bold text-teal-700 hover:bg-teal-100 transition px-3 py-1 mt-2">
                                    <span id="file-label-text">ファイルを選択</span>
                                    <input type="file" id="files" name="files" multiple required class="sr-only">
                                </label>
                            </div>
                            <p class="text-xs text-gray-400 mt-2">PNG, JPG, HEIC (ドラッグ＆ドロップ対応)</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div id="location-section" class="flex flex-col gap-1.5">
                        <label class="text-xs font-extrabold text-teal-800 flex items-center gap-1 ml-1">📍 場所</label>
                        <input type="text" id="location_name" name="location_name" placeholder="自動取得..."
                            class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl p-3 text-sm focus:bg-white focus:border-teal-500 outline-none transition-all">
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-extrabold text-teal-800 flex items-center gap-1 ml-1">🏷️ 分類</label>
                        <div class="relative">
                            <select id="category" name="category" 
                                class="w-full appearance-none bg-gray-50 border-2 border-gray-100 rounded-xl p-3 text-sm focus:bg-white focus:border-teal-500 outline-none transition-all cursor-pointer">
                                <option value="さかな">さかな</option>
                                <option value="貝類">貝類</option>
                                <option value="甲殻類">甲殻類</option>
                                <option value="鳥">鳥</option>
                                <option value="植物">植物</option>
                                <option value="キノコ">キノコ</option>
                                <option value="虫">虫</option>
                                <option value="その他" selected>その他</option>
                            </select>
                            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-gray-400 text-[10px]">▼</div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">種名</label>
                        <input type="text" name="species_name" placeholder="例：マツバガイ"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none shadow-sm">
                    </div>
                    <div class="pb-3 px-1">
                        <label class="flex items-center space-x-2 cursor-pointer group">
                            <input type="checkbox" name="is_identified" value="true" 
                                class="w-5 h-5 rounded text-teal-500 border-gray-300 focus:ring-teal-500 transition">
                            <span class="text-xs font-bold text-gray-600 group-hover:text-teal-600 transition">同定済み</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">観察日</label>
                        <input type="date" name="observed_on" id="observed_on" required
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">メモ</label>
                        <textarea name="notes" rows="1" placeholder="特徴など"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none"></textarea>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="location.href='/'" 
                        class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold hover:bg-gray-200 transition shadow-sm">
                        キャンセル
                    </button>
                    <button type="submit" id="submit-btn"
                        class="flex-[2] bg-teal-600 text-white py-4 rounded-2xl font-bold hover:bg-teal-700 shadow-lg transition transform active:scale-95 disabled:bg-gray-400">
                        投稿を公開する
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('files');
        const locationInput = document.getElementById('location_name');
        const categorySelect = document.getElementById('category'); // カテゴリ選択欄を取得
        const submitBtn = document.getElementById('submit-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const uploadIcon = document.getElementById('upload-icon');
        const fileLabelText = document.getElementById('file-label-text');

        // 今日の日付をデフォルトセット
        document.getElementById('observed_on').valueAsDate = new Date();

        // ファイル選択時の処理（表示変更 ＋ AIサジェスト）
        fileInput.addEventListener('change', async (e) => {
            const count = e.target.files.length;
            fileLabelText.innerText = count > 0 ? `${count}枚の画像を選択中` : 'ファイルを選択';

            if (count > 0) {
                // --- AIサジェスト機能の開始 ---
                const file = e.target.files[0]; // 1枚目の画像で判定
                const formData = new FormData();
                formData.append('file', file);

                // 視覚的なフィードバック（判定中...）
                categorySelect.classList.add('animate-pulse', 'border-teal-400');
                const originalLabel = fileLabelText.innerText;
                fileLabelText.innerText = "🔍 AIが分類を判定中...";

                try {
                    const response = await fetch('/suggest_category', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.suggestion) {
                            categorySelect.value = data.suggestion;
                            // 成功したら枠線を一瞬光らせるなどの演出
                            categorySelect.classList.add('ring-2', 'ring-teal-500');
                            setTimeout(() => categorySelect.classList.remove('ring-2', 'ring-teal-500'), 2000);
                        }
                    }
                } catch (err) {
                    console.error("AI解析エラー:", err);
                } finally {
                    categorySelect.classList.remove('animate-pulse', 'border-teal-400');
                    fileLabelText.innerText = originalLabel;
                }
                // --- AIサジェスト機能の終了 ---
            }
        });

        // フォーム送信処理（Fetch APIを使用）
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UIを「送信中」状態に
            submitBtn.disabled = true;
            submitBtn.innerText = "処理中...";
            uploadIcon.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');

            const formData = new FormData(form);

            try {
                const response = await fetch('/do_upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.status === 400 && result.status === 'need_location') {
                    // GPSがなかった場合の処理
                    alert(result.message);
                    locationInput.classList.remove('bg-gray-50');
                    locationInput.classList.add('border-red-500', 'bg-white');
                    locationInput.focus();
                    
                    // UIを元に戻す
                    submitBtn.disabled = false;
                    submitBtn.innerText = "投稿を公開する";
                    uploadIcon.classList.remove('hidden');
                    loadingSpinner.classList.add('hidden');
                } else if (response.ok) {
                    alert("投稿が完了しました！");
                    window.location.href = "/";
                } else {
                    throw new Error(result.error || "予期せぬエラーが発生しました");
                }
            } catch (err) {
                alert("エラー: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "投稿を公開する";
                uploadIcon.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
