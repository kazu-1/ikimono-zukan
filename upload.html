<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規投稿 | 石巻の生き物図鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1920&q=80');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7);
            z-index: -1;
        }
        .bg-white {
            background-color: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(5px);
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* ✅ トースト用のアニメーションスタイルを追加 */
        .toast-show { 
            opacity: 1 !important; 
            transform: translateY(0) !important; 
            pointer-events: auto !important;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pt-10 pb-20">

    <div id="toast" class="fixed top-10 right-10 z-[100] opacity-0 transition-all duration-500 transform translate-y-[-20px] pointer-events-none">
        <div class="bg-teal-600 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-4 border-2 border-white/20">
            <span class="text-2xl">✅</span>
            <div class="flex flex-col">
                <span id="toast-message" class="font-bold text-lg">完了しました</span>
                <span class="text-xs opacity-80">トップページへ戻ります...</span>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto my-10 px-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl border border-white/40">
            <header class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-teal-700 mb-2">新規投稿</h2>
                <p class="text-gray-500 text-sm">見つけた生き物を記録しましょう</p>
            </header>
            
            <form id="uploadForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-extrabold text-teal-800 mb-2 ml-1">📸 写真 (最大5枚まで)</label>
                    <div class="mt-1 flex flex-col items-center justify-center border-2 border-gray-300 border-dashed rounded-2xl hover:border-teal-500 transition-all bg-gray-50/50 p-6">
                        
                        <div id="upload-prompt" class="space-y-2 text-center">
                            <svg id="upload-icon" class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <div id="loading-spinner" class="hidden mx-auto h-12 w-12 animate-spin rounded-full border-4 border-teal-500 border-t-transparent"></div>
                            
                            <div class="flex flex-col items-center text-sm text-gray-600 justify-center">
                                <label class="relative cursor-pointer bg-teal-50 rounded-lg font-bold text-teal-700 hover:bg-teal-100 transition px-4 py-2 mt-2">
                                    <span id="file-label-text">ファイルを選択</span>
                                    <input type="file" id="files" name="files" accept="image/*" multiple required class="sr-only">
                                </label>
                                <p id="file-count-msg" class="text-[10px] text-gray-400 mt-2 italic">※ 5枚以内の画像を選択してください</p>
                                <p class="text-[10px] text-gray-400 mt-1 italic">※ AI判定は1枚目の画像を使用します</p>
                            </div>
                        </div>

                        <div id="preview-container" class="hidden w-full mt-4 border-t pt-4">
                            <div id="preview-list" class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide"></div>
                            <p class="text-[10px] text-gray-400 text-center mt-2 italic">左右にスワイプして確認できます。再度クリックで画像変更。</p>
                        </div>
                    </div>
                </div>

                <!-- 撮影場所（独立行・full width） -->
                <div class="mb-4">
                    <label class="text-xs font-extrabold text-teal-800 mb-1.5 ml-1 block">📍 撮影場所</label>
                    <div class="flex gap-2 items-center">
                        <div class="flex-1 h-[46px] px-4 bg-gray-50 border-2 border-gray-100 rounded-xl text-sm flex items-center text-gray-500" id="location-display">
                            <span id="location-text" class="truncate">写真から自動取得 または 地図で選んでください</span>
                        </div>
                        <button type="button" onclick="openMapModal()"
                            class="h-[46px] px-4 bg-teal-50 border-2 border-teal-100 rounded-xl text-teal-700 text-xs font-bold hover:bg-teal-100 transition whitespace-nowrap flex-shrink-0">
                            🗺️ 地図で選ぶ
                        </button>
                    </div>
                    <input type="hidden" id="location" name="location_name">
                    <input type="hidden" id="manual_lat" name="manual_lat">
                    <input type="hidden" id="manual_lon" name="manual_lon">
                </div>

                <!-- 分類（独立行） -->
                <div class="mb-4">
                    <label class="text-xs font-extrabold text-teal-800 mb-1.5 ml-1 block">🏷️ 分類</label>
                    <div class="relative">
                        <select id="category" name="category"
                            class="w-full h-[46px] appearance-none bg-gray-50 border-2 border-gray-100 rounded-xl px-4 text-sm focus:bg-white focus:border-teal-500 outline-none transition-all cursor-pointer">
                            <option value="さかな">さかな</option>
                            <option value="貝類">貝類</option>
                            <option value="甲殻類">甲殻類</option>
                            <option value="海藻">海藻</option>
                            <option value="鳥">鳥</option>
                            <option value="植物">植物</option>
                            <option value="キノコ">キノコ</option>
                            <option value="虫">虫</option>
                            <option value="爬虫類・両生類">爬虫類・両生類</option>
                            <option value="その他" selected>その他</option>
                        </select>
                        <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-400 text-[10px]">▼</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">種名</label>
                        <input type="text" id="species_name" name="species_name" placeholder="例：マツバガイ"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none shadow-sm transition-all">
                    </div>
                    <div class="pb-3 px-1">
                        <label class="flex items-center space-x-2 cursor-pointer group">
                            <input type="checkbox" name="is_identified" value="true" 
                                class="w-5 h-5 rounded text-teal-500 border-gray-300 focus:ring-teal-500 transition">
                            <span class="text-xs font-bold text-gray-600 group-hover:text-teal-600 transition">同定済み</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">観察日</label>
                        <input type="date" name="observed_on" id="observed_on" required
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">メモ</label>
                        <textarea name="notes" rows="1" placeholder="特徴など"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none"></textarea>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="window.location.href='/'" 
                        class="flex-1 bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold hover:bg-gray-200 transition shadow-sm">
                        キャンセル
                    </button>
                    
                    <button type="submit" id="submit-btn"
                        class="flex-[2] bg-teal-600 text-white py-4 rounded-2xl font-bold hover:bg-teal-700 shadow-lg transition transform active:scale-95 disabled:bg-gray-400">
                        投稿を公開する
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 地図モーダル -->
    <div id="map-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden">
            <div class="flex items-center justify-between px-5 py-3 border-b">
                <h2 class="font-bold text-gray-800">📍 場所を地図で選ぶ</h2>
                <button type="button" onclick="closeMapModal()" class="text-gray-400 hover:text-gray-600 text-xl font-bold">✕</button>
            </div>
            <div id="leaflet-map" style="height: 360px;"></div>
            <div class="px-5 py-3 bg-gray-50 border-t">
                <p class="text-xs text-gray-500 mb-1">地図をタップしてピンを立ててください</p>
                <p id="map-address-preview" class="text-sm font-bold text-teal-700 min-h-[20px]"></p>
            </div>
            <div class="flex gap-3 px-5 py-3 border-t">
                <button type="button" onclick="closeMapModal()"
                    class="flex-1 py-2 rounded-xl bg-gray-100 text-gray-600 text-sm font-bold hover:bg-gray-200 transition">
                    キャンセル
                </button>
                <button type="button" id="map-confirm-btn" onclick="confirmMapLocation()" disabled
                    class="flex-[2] py-2 rounded-xl bg-teal-600 text-white text-sm font-bold hover:bg-teal-700 transition disabled:bg-gray-300">
                    この場所に決定
                </button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('files');
        const previewList = document.getElementById('preview-list');
        const previewContainer = document.getElementById('preview-container');
        const fileCountMsg = document.getElementById('file-count-msg');
        const categorySelect = document.getElementById('category');
        const speciesInput = document.getElementById('species_name');
        const submitBtn = document.getElementById('submit-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const uploadIcon = document.getElementById('upload-icon');
        const fileLabelText = document.getElementById('file-label-text');
        const locationInput = document.getElementById('location');
        const locationText = document.getElementById('location-text');
        const locationDisplay = document.getElementById('location-display');

        function setLocationDisplay(address, source) {
            locationInput.value = address || '';
            if (address) {
                locationText.textContent = (source === 'gps' ? '📷 ' : '🗺️ ') + address;
                locationDisplay.classList.remove('text-gray-400');
                locationDisplay.classList.add('text-gray-800');
            } else {
                locationText.textContent = '写真から自動取得 または 地図で選んでください';
                locationDisplay.classList.remove('text-gray-800');
                locationDisplay.classList.add('text-gray-400');
            }
        }

        document.getElementById('observed_on').valueAsDate = new Date();

        // ✅ showToast 関数の追加
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.innerText = message;
            toast.classList.add('toast-show');
            setTimeout(() => {
                toast.classList.remove('toast-show');
                setTimeout(() => { window.location.href = "/"; }, 500);
            }, 2500);
        }

        // プレビュー生成関数
        const updatePreviews = (files) => {
            previewList.innerHTML = '';
            if (files.length > 0) {
                previewContainer.classList.remove('hidden');
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = "w-24 h-24 object-cover rounded-lg shadow-sm flex-shrink-0 border-2 border-white";
                        previewList.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            } else {
                previewContainer.classList.add('hidden');
            }
        };

        // メインの変更イベント
        fileInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            const count = files.length;

            // 1. バリデーション（5枚制限）
            if (count > 5) {
                alert("写真は最大5枚までしかアップロードできません。");
                e.target.value = ""; // 選択をクリア
                fileLabelText.innerText = "ファイルを選択";
                fileCountMsg.innerText = "⚠️ 5枚を超えています";
                fileCountMsg.classList.add('text-red-500');
                previewContainer.classList.add('hidden');
                return;
            }

            // 2. UI更新
            fileCountMsg.innerText = "※ 5枚以内の画像を選択してください";
            fileCountMsg.classList.remove('text-red-500');
            fileLabelText.innerText = count > 0 ? `${count}枚の画像を選択中` : 'ファイルを選択';
            
            updatePreviews(files);

            // 3. AI解析 ＆ 位置情報取得 (最初の1枚を使用・並列実行)
            if (count > 0) {
                const file = files[0];
                const formDataAI = new FormData();
                formDataAI.append('file', file);
                const formDataLoc = new FormData();
                formDataLoc.append('file', file);

                categorySelect.classList.add('animate-pulse', 'border-teal-400');
                speciesInput.classList.add('animate-pulse', 'bg-teal-50');
                locationDisplay.classList.add('animate-pulse', 'bg-teal-50');
                locationText.textContent = '📍 取得中...';
                const originalLabel = fileLabelText.innerText;
                fileLabelText.innerText = "🔍 AI解析中...";
                submitBtn.disabled = true;

                try {
                    const [aiRes, locRes] = await Promise.all([
                        fetch('/suggest_category', { method: 'POST', body: formDataAI }),
                        fetch('/get_location',     { method: 'POST', body: formDataLoc }),
                    ]);

                    // AI判定結果
                    if (aiRes.ok) {
                        const data = await aiRes.json();
                        if (data.suggestion) categorySelect.value = data.suggestion;
                        if (data.species) {
                            speciesInput.value = data.species;
                            speciesInput.classList.add('ring-2', 'ring-teal-500');
                            setTimeout(() => speciesInput.classList.remove('ring-2', 'ring-teal-500'), 2000);
                        }
                    }

                    // 位置情報結果
                    if (locRes.ok) {
                        const locData = await locRes.json();
                        if (locData.address) {
                            setLocationDisplay(locData.address, 'gps');
                            locationDisplay.classList.add('ring-2', 'ring-teal-500');
                            setTimeout(() => locationDisplay.classList.remove('ring-2', 'ring-teal-500'), 2000);
                        } else {
                            setLocationDisplay(null);
                        }
                    }
                } catch (err) {
                    console.error("解析エラー:", err);
                } finally {
                    categorySelect.classList.remove('animate-pulse', 'border-teal-400');
                    speciesInput.classList.remove('animate-pulse', 'bg-teal-50');
                    locationDisplay.classList.remove('animate-pulse', 'bg-teal-50');
                    fileLabelText.innerText = originalLabel;
                    submitBtn.disabled = false;
                }
            }
        });

        // 送信処理
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerText = "処理中...";
            uploadIcon.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');

            const formData = new FormData(form);

            try {
                const response = await fetch('/do_upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (response.status === 400 && result.status === 'need_location') {
                    alert(result.message);
                    document.getElementById('location').focus();
                    resetUI();
                } else if (response.ok) {
                    // ✅ alert("投稿が完了しました！") を showToast に変更
                    showToast("投稿が完了しました！🌿");
                } else {
                    throw new Error(result.error || "予期せぬエラーが発生しました");
                }
            } catch (err) {
                alert("エラー: " + err.message);
                resetUI();
            }
        });

        function resetUI() {
            submitBtn.disabled = false;
            submitBtn.innerText = "投稿を公開する";
            uploadIcon.classList.remove('hidden');
            loadingSpinner.classList.add('hidden');
        }

        // === 地図モーダル ===
        let leafletMap = null;
        let mapMarker = null;
        let pendingLat = null;
        let pendingLon = null;

        function openMapModal() {
            document.getElementById('map-modal').classList.remove('hidden');
            // 初回のみ地図を初期化（石巻市中心）
            if (!leafletMap) {
                leafletMap = L.map('leaflet-map').setView([38.4149, 141.3028], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(leafletMap);

                leafletMap.on('click', async function(e) {
                    pendingLat = e.latlng.lat;
                    pendingLon = e.latlng.lng;

                    // ピンを更新
                    if (mapMarker) mapMarker.remove();
                    mapMarker = L.marker([pendingLat, pendingLon]).addTo(leafletMap);

                    // 住所を取得して表示
                    const preview = document.getElementById('map-address-preview');
                    preview.textContent = '📍 住所を取得中...';
                    document.getElementById('map-confirm-btn').disabled = true;

                    try {
                        const res = await fetch(`/reverse_geocode?lat=${pendingLat}&lon=${pendingLon}`);
                        const data = await res.json();
                        preview.textContent = data.address || `${pendingLat.toFixed(5)}, ${pendingLon.toFixed(5)}`;
                    } catch {
                        preview.textContent = `${pendingLat.toFixed(5)}, ${pendingLon.toFixed(5)}`;
                    }
                    document.getElementById('map-confirm-btn').disabled = false;
                });
            }
            // 地図サイズを再計算（モーダル表示後に必要）
            setTimeout(() => leafletMap.invalidateSize(), 150);
        }

        function closeMapModal() {
            document.getElementById('map-modal').classList.add('hidden');
        }

        function confirmMapLocation() {
            if (pendingLat === null || pendingLon === null) return;
            const address = document.getElementById('map-address-preview').textContent;
            setLocationDisplay(address, 'map');
            document.getElementById('manual_lat').value = pendingLat;
            document.getElementById('manual_lon').value = pendingLon;
            locationDisplay.classList.add('ring-2', 'ring-teal-500');
            setTimeout(() => locationDisplay.classList.remove('ring-2', 'ring-teal-500'), 2000);
            closeMapModal();
        }
    </script>
</body>
</html>
